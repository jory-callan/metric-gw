---
apiVersion: v1
kind: Secret
metadata:
  name: metric-gw-config
  namespace: metric-gw
  labels:
    app: metric-gw
type: Opaque
stringData:
  config.yaml: |
    server:
      listen: ":9201"
      max_body_size: "10MB"

    auth:
      mode: apikey
      api_key: "${API_KEY}"

    buffer:
      memory:
        max_items: 100000
      disk:
        enabled: true
        path: "/data/metric-gw"
        max_size: "1GB"

    flush:
      batch_size: 5000
      interval: "1s"
      timeout: "10s"
      retry:
        max_attempts: 0
        backoff: exponential
        initial_delay: "1s"
        max_delay: "30s"

    backends:
      - name: "vm-single"
        type: vm_import
        url: "http://vmsingle-monitoring.monitoring:8429/api/v1/import"
